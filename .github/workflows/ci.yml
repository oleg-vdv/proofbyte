name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  dogfood:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Self-scan (dogfood)
        run: node packages/pqc-radar/dist/index.js scan . --cbom cbom.json --report report.md --sarif findings.sarif
      - uses: actions/upload-artifact@v7
        with:
          name: self-scan
          path: |
            cbom.json
            report.md
            findings.sarif
