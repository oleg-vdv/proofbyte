name: Corpus

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

jobs:
  corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Scan corpus
        run: bash scripts/corpus.sh | tee corpus-results.md
      - uses: actions/upload-artifact@v7
        with:
          name: corpus-results
          path: corpus-results.md
